<svg width="100%" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Logo YA Consulting Gest-Pro, version 2</title>
<desc>Emblème circulaire bleu marine et or avec des barres ascendantes fines et une flèche, accompagné du nom YA Consulting et de la signature Gest-Pro</desc>
<defs>
<marker id="arrowhead2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#E3CD8E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Cercle emblème - Fond bleu marine plus profond -->
<circle cx="100" cy="100" r="75" fill="#0B1E3F" />
<!-- Cercle emblème - Bordure or plus brillant -->
<circle cx="100" cy="100" r="75" fill="none" stroke="#DFB122" stroke-width="3" />
<circle cx="100" cy="100" r="64" fill="none" stroke="#DFB122" stroke-width="0.7" opacity="0.6" />

<!-- Barres de graphique - Or brillant -->
<rect x="70" y="102" width="11" height="28" rx="3" fill="#DFB122" />
<rect x="94" y="84" width="11" height="46" rx="3" fill="#DFB122" />
<rect x="118" y="66" width="11" height="64" rx="3" fill="#DFB122" />

<!-- Flèche ascendante - Or plus clair/brillant -->
<path d="M76 98 L100 80 L122 60" fill="none" stroke="#F1D78C" stroke-width="2.5" marker-end="url(#arrowhead2)" />

<!-- Texte principal YA CONSULTING - Police Inter ultra-bold, bleu marine profond -->
<text x="205" y="94" font-family="'Inter', 'Outfit', -apple-system, sans-serif" font-size="44" font-weight="900" fill="#0B1E3F" letter-spacing="1">YA CONSULTING</text>

<!-- Ligne de séparation - Or brillant -->
<line x1="205" y1="110" x2="570" y2="110" stroke="#DFB122" stroke-width="2" />

<!-- Losange de séparation - Or brillant -->
<rect x="205" y="130" width="15" height="15" fill="#DFB122" transform="rotate(45 212.5 137.5)" />

<!-- Texte secondaire GEST-PRO - Police Inter bold, or brillant -->
<text x="240" y="152" font-family="'Inter', 'Outfit', -apple-system, sans-serif" font-size="44" font-weight="900" fill="#DFB122" letter-spacing="1">GEST-PRO</text>

</svg>
